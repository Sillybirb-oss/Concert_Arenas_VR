  <body>
    <a-scene
      renderer="antialias: true; physicallyCorrectLights: true; colorManagement: true"
      background="color: #070816"
      fog="type: exponential; color: #0b0a1c; density: 0.012"
      xr-mode-ui="enabled: true"
    >
      
      <a-assets>
        <a-mixin id="teleport" teleport-controls="cameraRig: #rig; teleportOrigin: #camera; button: trigger; curveShootingSpeed: 18; landingMaxAngle: 60"></a-mixin>
      </a-assets>

      <a-sky color="#0a0b22"></a-sky>

      <a-entity light="type: ambient; intensity: 0.55; color: #9aa8ff"></a-entity>
      <a-entity light="type: directional; intensity: 0.6; color: #cfd6ff" position="2 8 4"></a-entity>

      <a-entity 
        id="rig" 
        movement-controls="controls: checkpoint, gamepad, keyboard, touch; speed: 0.3" 
        position="0 0 0">
        
        <a-entity id="camera" camera position="0 1.6 0" look-controls="pointerLockEnabled: false"></a-entity>

        <a-entity id="leftHand" laser-controls="hand: left" mixin="teleport"></a-entity>
        <a-entity id="rightHand" laser-controls="hand: right" mixin="teleport"></a-entity>

        <a-entity hand-tracking-controls="hand: left" teleport-controls="cameraRig: #rig; teleportOrigin: #camera; inputEvents: pinchstarted"></a-entity>
        <a-entity hand-tracking-controls="hand: right" teleport-controls="cameraRig: #rig; teleportOrigin: #camera; inputEvents: pinchstarted"></a-entity>
      </a-entity>

        id="floor"
        class="floor"
        position="0 -0.05 -30"
        width="40"
        height="0.1"
        depth="80"
        material="color: #06061a; roughness: 0.95; metalness: 0.05"
      ></a-box>
