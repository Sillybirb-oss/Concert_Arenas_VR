<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Tomorrowland Entrance – Enhanced Hand Tracking (Quest 3)</title>

    <!-- A-Frame core -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <!-- Extras for movement controls & hand tracking -->
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.4.0/dist/aframe-extras.min.js"></script>

    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #000;
      }
    </style>

    <script>
      /* Original shader and components from previous version */
      AFRAME.registerShader("psychedelic-canopy", {
        schema: { timeMsec: { type: "time", is: "uniform" } },
        vertexShader: [
          "varying vec2 vUv;",
          "void main() {",
          "  vUv = uv;",
          "  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);",
          "}",
        ].join("\n"),
        fragmentShader: [
          "uniform float timeMsec;",
          "varying vec2 vUv;",
          "void main() {",
          "  float t = timeMsec * 0.00025;",
          "  vec2 p = vUv * 4.0;",
          "  float angle = sin(p.y + t) * 1.5 + cos(p.x * 1.2 - t * 0.7);",
          "  float radius = length(p - 2.0);",
          "  float swirl = sin(radius * 4.0 - t * 3.0 + angle);",
          "  float bands = sin((p.x + swirl) * 3.0 + t * 2.0);",
          "  float bands2 = cos((p.y - swirl) * 2.5 - t * 1.7);",
          "  vec3 base = vec3(0.1, 0.0, 0.15);",
          "  vec3 neon1 = vec3(0.2, 0.8, 1.0);",
          "  vec3 neon2 = vec3(1.0, 0.1, 0.7);",
          "  vec3 neon3 = vec3(0.1, 1.0, 0.4);",
          "  float m1 = smoothstep(0.0, 1.0, 0.5 + 0.5 * bands);",
          "  float m2 = smoothstep(0.0, 1.0, 0.5 + 0.5 * bands2);",
          "  vec3 color = base + m1 * neon1 + m2 * neon2 + (1.0 - abs(swirl)) * 0.4 * neon3;",
          "  color *= 1.4;",
          "  gl_FragColor = vec4(color, 1.0);",
          "}",
        ].join("\n"),
      });

      AFRAME.registerComponent("float-yoyo", {
        schema: { amplitude: { default: 0.25 }, speed: { default: 1.0 } },
        init: function () {
          this.startY = this.el.object3D.position.y;
          this.t = 0;
        },
        tick: function (time, dt) {
          this.t += dt / 1000;
          this.el.object3D.position.y = this.startY + Math.sin(this.t * this.data.speed) * this.data.amplitude;
        },
      });

      AFRAME.registerComponent("planar-mirror", {
        schema: { resolution: { default: 512 }, intervalMs: { default: 33 } },
        init: function () {
          this._mirrorPos = new THREE.Vector3();
          this._camPos = new THREE.Vector3();
          this._normal = new THREE.Vector3();
          this._q = new THREE.Quaternion();
          this._camQ = new THREE.Quaternion();
          this._camDir = new THREE.Vector3();
          this._camUp = new THREE.Vector3();
          this._reflPos = new THREE.Vector3();
          this._reflDir = new THREE.Vector3();
          this._reflUp = new THREE.Vector3();
          this._lookAt = new THREE.Vector3();

          this.reflectCam = new THREE.PerspectiveCamera();
          this.mesh = null;
          this.rt = null;

          this.tick = AFRAME.utils.throttleTick(this.tick, this.data.intervalMs, this);

          const trySetup = () => {
            const mesh = this.el.getObject3D("mesh");
            if (!mesh) return;

            this.mesh = mesh;
            this.rt = new THREE.WebGLRenderTarget(this.data.resolution, this.data.resolution, {
              minFilter: THREE.LinearFilter,
              magFilter: THREE.LinearFilter,
              format: THREE.RGBAFormat,
              depthBuffer: true,
              stencilBuffer: false,
            });

            this.rt.texture.wrapS = THREE.RepeatWrapping;
            this.rt.texture.repeat.x = -1;

            this.mesh.material = new THREE.MeshStandardMaterial({
              color: 0xffffff,
              metalness: 1.0,
              roughness: 0.03,
              map: this.rt.texture,
              emissive: new THREE.Color(0x111122),
              emissiveIntensity: 0.25,
            });
          };

          this.el.addEventListener("object3dset", (e) => {
            if (e.detail.type === "mesh") trySetup();
          });

          if (this.el.getObject3D("mesh")) trySetup();
        },

        tick: function () {
          if (!this.mesh || !this.rt) return;

          const sceneEl = this.el.sceneEl;
          const renderer = sceneEl && sceneEl.renderer;
          const threeScene = sceneEl && sceneEl.object3D;
          let mainCam = sceneEl && sceneEl.camera;
          if (!renderer || !threeScene || !mainCam) return;

          if (mainCam.isArrayCamera && mainCam.cameras && mainCam.cameras.length) {
            mainCam = mainCam.cameras[0];
          }

          this.el.object3D.getWorldPosition(this._mirrorPos);
          this.el.object3D.getWorldQuaternion(this._q);
          this._normal.set(0, 0, 1).applyQuaternion(this._q).normalize();

          mainCam.getWorldPosition(this._camPos);
          mainCam.getWorldQuaternion(this._camQ);

          this._camDir.set(0, 0, -1).applyQuaternion(this._camQ).normalize();
          this._camUp.set(0, 1, 0).applyQuaternion(this._camQ).normalize();

          const toCam = this._camPos.clone().sub(this._mirrorPos);
          const dist = toCam.dot(this._normal);
          this._reflPos.copy(this._camPos).sub(this._normal.clone().multiplyScalar(2 * dist));

          this._reflDir.copy(this._camDir).sub(this._normal.clone().multiplyScalar(2 * this._camDir.dot(this._normal)));
          this._reflUp.copy(this._camUp).sub(this._normal.clone().multiplyScalar(2 * this._camUp.dot(this._normal)));

          this.reflectCam.fov = mainCam.fov || 60;
          this.reflectCam.near = mainCam.near || 0.05;
          this.reflectCam.far = mainCam.far || 2000;
          this.reflectCam.aspect = 1;

          this.reflectCam.position.copy(this._reflPos);
          this.reflectCam.up.copy(this._reflUp);
          this._lookAt.copy(this._reflPos).add(this._reflDir);
          this.reflectCam.lookAt(this._lookAt);
          this.reflectCam.updateProjectionMatrix();

          const prevRT = renderer.getRenderTarget();
          const prevXr = renderer.xr.enabled;

          this.mesh.visible = false;
          renderer.xr.enabled = false;

          renderer.setRenderTarget(this.rt);
          renderer.clear();
          renderer.render(threeScene, this.reflectCam);

          renderer.setRenderTarget(prevRT);
          renderer.xr.enabled = prevXr;
          this.mesh.visible = true;
        },
      });

      /* NEW: Enhanced hand tracking visualization and feedback */
      AFRAME.registerComponent("hand-locomotion-enhancer", {
        schema: {
          hand: { type: "string", default: "left" },
        },
        init: function () {
          this.rig = document.getElementById("rig");
          this.trail = null;
          this.arrow = null;
          this.isMoving = false;
          
          // Create visual feedback elements
          this.createVisualFeedback();
        },
        
        createVisualFeedback: function () {
          // Create a trail effect for the hand when moving
          const trailEl = document.createElement("a-entity");
          trailEl.setAttribute("geometry", "primitive: torus; radius: 0.15; radiusTubular: 0.02");
          trailEl.setAttribute("material", "color: #00ffff; emissive: #00ffff; emissiveIntensity: 2.0; transparent: true; opacity: 0.8");
          trailEl.setAttribute("scale", "1 1 0.2");
          trailEl.setAttribute("visible", "false");
          this.el.appendChild(trailEl);
          this.trail = trailEl;
          
          // Create direction arrow
          const arrowEl = document.createElement("a-entity");
          arrowEl.setAttribute("geometry", "primitive: cone; radiusBottom: 0.1; radiusTop: 0; height: 0.4");
          arrowEl.setAttribute("material", "color: #ff00ff; emissive: #ff00ff; emissiveIntensity: 2.0");
          arrowEl.setAttribute("position", "0 0 -0.3");
          arrowEl.setAttribute("rotation", "90 0 0");
          arrowEl.setAttribute("visible", "false");
          this.el.appendChild(arrowEl);
          this.arrow = arrowEl;
          
          // Add pulsing glow sphere at palm
          const glowEl = document.createElement("a-entity");
          glowEl.setAttribute("geometry", "primitive: sphere; radius: 0.08");
          glowEl.setAttribute("material", "color: #ffffff; emissive: #00ffff; emissiveIntensity: 1.5; transparent: true; opacity: 0.9");
          glowEl.setAttribute("position", "0 0 0.05");
          glowEl.setAttribute("animation__pulse", "property: scale; from: 0.8 0.8 0.8; to: 1.2 1.2 1.2; dir: alternate; dur: 300; loop: true");
          this.el.appendChild(glowEl);
          this.glow = glowEl;
        },
        
        tick: function () {
          if (!this.rig) return;
          
          // Check if hand is in locomotion pose (simplified - in real implementation, 
          // this would use hand tracking data to detect pose)
          // For demonstration, we'll use a timer to simulate
          const handPose = this.el.components['hand-tracking-controls'];
          if (handPose) {
            // This is a simplified check - actual pose detection would be more complex
            const isPointing = Math.random() > 0.5; // Placeholder
            
            if (isPointing) {
              this.isMoving = true;
              this.showVisualFeedback();
              
              // Update trail position with offset
              if (this.trail) {
                this.trail.setAttribute("visible", "true");
                this.trail.setAttribute("position", "0 0 -0.2");
                this.trail.setAttribute("animation__rotate", "property: rotation; to: 0 360 0; dur: 1000; loop: true");
              }
              
              if (this.arrow) {
                this.arrow.setAttribute("visible", "true");
                this.arrow.setAttribute("material", "emissiveIntensity", 2.0 + Math.sin(Date.now() * 0.01) * 0.5);
              }
              
              if (this.glow) {
                this.glow.setAttribute("material", "emissive", "#ff00ff");
              }
            } else {
              this.isMoving = false;
              this.hideVisualFeedback();
            }
          }
        },
        
        showVisualFeedback: function () {
          // Visuals are shown in tick, but we can add particle effects here
          if (this.trail) {
            this.trail.setAttribute("visible", "true");
          }
          if (this.arrow) {
            this.arrow.setAttribute("visible", "true");
          }
        },
        
        hideVisualFeedback: function () {
          if (this.trail) {
            this.trail.setAttribute("visible", "false");
          }
          if (this.arrow) {
            this.arrow.setAttribute("visible", "false");
          }
          if (this.glow) {
            this.glow.setAttribute("material", "emissive", "#00ffff");
          }
        }
      });

      /* NEW: Velocity indicator for speed feedback */
      AFRAME.registerComponent("velocity-indicator", {
        init: function () {
          this.rig = document.getElementById("rig");
          this.createIndicator();
        },
        
        createIndicator: function () {
          const indicator = document.createElement("a-entity");
          indicator.setAttribute("position", "0 -0.5 -1");
          indicator.setAttribute("visible", "false");
          this.indicator = indicator;
          this.el.appendChild(indicator);
          
          // Speed bar
          const bar = document.createElement("a-box");
          bar.setAttribute("width", "0.1");
          bar.setAttribute("height", "0.02");
          bar.setAttribute("depth", "0.5");
          bar.setAttribute("material", "color: #00ffff; emissive: #00ffff; emissiveIntensity: 1.5");
          bar.setAttribute("position", "0 0 0");
          indicator.appendChild(bar);
          
          // Fill bar (changes size based on speed)
          const fill = document.createElement("a-box");
          fill.setAttribute("width", "0.12");
          fill.setAttribute("height", "0.04");
          fill.setAttribute("depth", "0.5");
          fill.setAttribute("material", "color: #ff00ff; emissive: #ff00ff; emissiveIntensity: 2.0");
          fill.setAttribute("position", "0 0 0");
          fill.setAttribute("scale", "1 1 0");
          indicator.appendChild(fill);
          this.fill = fill;
          
          // Text label
          const text = document.createElement("a-entity");
          text.setAttribute("text", "value: LOCOMOTION ACTIVE; align: center; color: #ffffff; width: 2");
          text.setAttribute("position", "0 0.1 0");
          text.setAttribute("scale", "0.5 0.5 0.5");
          indicator.appendChild(text);
        },
        
        tick: function () {
          if (!this.rig || !this.fill) return;
          
          const velocity = this.rig.components['movement-controls']?.velocity;
          if (velocity && (Math.abs(velocity.x) > 0.01 || Math.abs(velocity.z) > 0.01)) {
            this.indicator.setAttribute("visible", "true");
            
            // Calculate speed factor (0-1)
            const speed = Math.sqrt(velocity.x*velocity.x + velocity.z*velocity.z) / 1.6; // max speed 1.6
            this.fill.setAttribute("scale", `1 1 ${Math.min(speed, 1)}`);
            
            // Color based on speed
            const hue = 0.3 + speed * 0.3; // cyan to magenta
            this.fill.setAttribute("material", "color", `hsl(${hue * 360}, 100%, 50%)`);
          } else {
            this.indicator.setAttribute("visible", "false");
          }
        }
      });

      /* NEW: Ground marker for destination preview */
      AFRAME.registerComponent("destination-marker", {
        init: function () {
          this.rig = document.getElementById("rig");
          this.marker = null;
          this.createMarker();
        },
        
        createMarker: function () {
          const marker = document.createElement("a-entity");
          marker.setAttribute("geometry", "primitive: ring; radiusInner: 0.5; radiusOuter: 0.7");
          marker.setAttribute("material", "color: #00ffff; emissive: #00ffff; emissiveIntensity: 2.0; transparent: true; opacity: 0.8");
          marker.setAttribute("rotation", "-90 0 0");
          marker.setAttribute("position", "0 0.01 0");
          marker.setAttribute("visible", "false");
          marker.setAttribute("animation__pulse", "property: scale; from: 0.8 0.8 0.8; to: 1.2 1.2 1.2; dir: alternate; dur: 500; loop: true");
          this.el.sceneEl.appendChild(marker);
          this.marker = marker;
        },
        
        tick: function () {
          if (!this.rig || !this.marker) return;
          
          const leftHand = document.querySelector("[hand-tracking-controls='hand: left']");
          if (!leftHand) return;
          
          const handPose = leftHand.components['hand-tracking-controls'];
          const isMoving = this.rig.components['movement-controls']?.velocity?.length() > 0.01;
          
          if (isMoving && handPose) {
            // Get hand direction and project to ground
            const handPos = leftHand.object3D.position;
            const handDir = new THREE.Vector3(0, 0, -1);
            handDir.applyQuaternion(leftHand.object3D.quaternion);
            
            // Project to ground plane (y=0)
            if (handDir.y < 0) {
              const t = -handPos.y / handDir.y;
              const groundPos = new THREE.Vector3(
                handPos.x + handDir.x * t,
                0,
                handPos.z + handDir.z * t
              );
              
              this.marker.setAttribute("position", groundPos);
              this.marker.setAttribute("visible", "true");
              
              // Distance indicator
              const distance = groundPos.distanceTo(this.rig.object3D.position);
              this.marker.setAttribute("scale", `${Math.min(distance/2, 2)} ${Math.min(distance/2, 2)} ${Math.min(distance/2, 2)}`);
            } else {
              this.marker.setAttribute("visible", "false");
            }
          } else {
            this.marker.setAttribute("visible", "false");
          }
        }
      });
    </script>
  </head>

  <body>
    <a-scene
      renderer="antialias: true; physicallyCorrectLights: true; colorManagement: true"
      background="color: #070816"
      fog="type: exponential; color: #0b0a1c; density: 0.012"
      vr-mode-ui="enabled: true"
      tracked-controls-webxr="handTracking: true"
    >
      <!-- Sky + global ambient / directional lighting -->
      <a-sky color="#0a0b22"></a-sky>

      <a-entity light="type: ambient; intensity: 0.55; color: #9aa8ff"></a-entity>
      <a-entity light="type: directional; intensity: 0.6; color: #cfd6ff" position="2 8 4"></a-entity>
      <a-entity light="type: directional; intensity: 0.35; color: #ff7bda" position="-4 6 -8"></a-entity>

      <!-- Stylized depth walls (same as before) -->
      <a-box position="-13 3 -30" width="1" height="8" depth="80" material="color: #060616; metalness: 0.2; roughness: 0.9"></a-box>
      <a-box position="13 3 -30" width="1" height="8" depth="80" material="color: #060616; metalness: 0.2; roughness: 0.9"></a-box>
      <a-box position="-12.4 3 -30" width="0.12" height="8" depth="80" material="color: #00eaff; emissive: #00eaff; emissiveIntensity: 0.9; opacity: 0.35; transparent: true"></a-box>
      <a-box position="12.4 3 -30" width="0.12" height="8" depth="80" material="color: #ff2bd6; emissive: #ff2bd6; emissiveIntensity: 0.9; opacity: 0.35; transparent: true"></a-box>

      <!-- ENHANCED PLAYER RIG with prominent hand tracking -->
      <a-entity
        id="rig"
        position="0 0 0"
        movement-controls="speed: 2.2; fly: false; controls: hand; hand: left; acceleration: 15"
      >
        <a-entity
          id="camera"
          camera
          position="0 1.6 0"
          look-controls="pointerLockEnabled: false"
        ></a-entity>

        <!-- LEFT HAND - PRIMARY LOCOMOTION with enhanced visuals -->
        <a-entity 
          hand-tracking-controls="hand: left; modelColor: #ff00ff; modelOpacity: 0.9"
          hand-locomotion-enhancer="hand: left"
          velocity-indicator
        >
          <!-- Additional visual flair for left hand -->
          <a-entity 
            geometry="primitive: torus; radius: 0.2; radiusTubular: 0.01"
            material="color: #ff00ff; emissive: #ff00ff; emissiveIntensity: 2.0; transparent: true; opacity: 0.6"
            position="0 0 -0.1"
            rotation="90 0 0"
            animation__spin="property: rotation; to: 90 360 0; dur: 2000; loop: true"
          ></a-entity>
        </a-entity>

        <!-- RIGHT HAND - SECONDARY with complementary visuals -->
        <a-entity 
          hand-tracking-controls="hand: right; modelColor: #00ffff; modelOpacity: 0.9"
        >
          <a-entity 
            geometry="primitive: sphere; radius: 0.1"
            material="color: #00ffff; emissive: #00ffff; emissiveIntensity: 1.5; transparent: true; opacity: 0.5"
            position="0 0 0"
            animation__pulse="property: scale; from: 0.8 0.8 0.8; to: 1.4 1.4 1.4; dir: alternate; dur: 800; loop: true"
          ></a-entity>
        </a-entity>

        <!-- Keep laser controls as fallback but hand tracking takes priority -->
        <a-entity laser-controls="hand: left"></a-entity>
        <a-entity laser-controls="hand: right"></a-entity>
      </a-entity>

      <!-- Destination preview marker (shows where you're heading) -->
      <a-entity destination-marker></a-entity>

      <!-- LED canopy -->
      <a-entity
        geometry="primitive: cylinder; radius: 18; height: 80; openEnded: true; thetaStart: 0; thetaLength: 180"
        rotation="90 0 90"
        position="0 9 -30"
        material="shader: psychedelic-canopy; side: double"
      ></a-entity>

      <!-- Ground -->
      <a-box position="0 -0.05 -30" width="40" height="0.1" depth="80" material="color: #06061a; roughness: 0.95; metalness: 0.05"></a-box>

      <!-- Glowing pathway (enhanced) -->
      <a-box position="0 0.03 -30" width="5" height="0.06" depth="80" material="color: #031a24; emissive: #00d4ff; emissiveIntensity: 1.5; opacity: 0.9; transparent: true; roughness: 0.25; metalness: 0.1" animation__pulse="property: material.emissiveIntensity; from: 0.8; to: 2.2; dir: alternate; dur: 1200; loop: true"></a-box>
      <a-box position="-2.62 0.035 -30" width="0.18" height="0.07" depth="80" material="color: #00ffff; emissive: #00ffff; emissiveIntensity: 2.0; opacity: 0.95; transparent: true" animation__edge="property: material.opacity; from: 0.5; to: 1.0; dir: alternate; dur: 1000; loop: true"></a-box>
      <a-box position="2.62 0.035 -30" width="0.18" height="0.07" depth="80" material="color: #ff00ff; emissive: #ff00ff; emissiveIntensity: 2.0; opacity: 0.95; transparent: true" animation__edge="property: material.opacity; from: 0.5; to: 1.0; dir: alternate; dur: 1100; loop: true"></a-box>

      <!-- ZONE 1: GRAND TOMORROWLAND ENTRANCE GATE (same as before) -->
      <a-entity position="0 0 0">
        <a-entity light="type: point; intensity: 2.4; distance: 22; decay: 1.6; color: #ffd2a1" position="0 6 -6"></a-entity>
        <a-entity light="type: point; intensity: 1.4; distance: 18; decay: 1.5; color: #7af7ff" position="-4 4 -6"></a-entity>
        <a-entity light="type: point; intensity: 1.4; distance: 18; decay: 1.5; color: #ff4be1" position="4 4 -6"></a-entity>
        <a-box position="0 0.12 -5.5" width="10" height="0.24" depth="4" material="color: #07071a; metalness: 0.3; roughness: 0.85"></a-box>
        <a-box position="0 0.28 -5.7" width="8" height="0.18" depth="3" material="color: #090926; metalness: 0.35; roughness: 0.75"></a-box>
        
        <!-- Left pylon -->
        <a-entity position="-4.2 0 -6">
          <a-cylinder position="0 2 0" radius="0.55" height="4" material="color: #071022; emissive: #00eaff; emissiveIntensity: 0.8; metalness: 0.9; roughness: 0.2"></a-cylinder>
          <a-torus position="0 4.4 0" radius="1.05" radius-tubular="0.08" rotation="90 0 0" material="color: #00eaff; emissive: #00eaff; emissiveIntensity: 1.6; opacity: 0.9; transparent: true" animation__spin="property: rotation; to: 90 0 360; dur: 9000; easing: linear; loop: true"></a-torus>
          <a-icosahedron position="0 5.3 0" radius="0.55" material="color: #0b0420; emissive: #ff2bd6; emissiveIntensity: 0.9; metalness: 0.7; roughness: 0.25"></a-icosahedron>
        </a-entity>
        
        <!-- Right pylon -->
        <a-entity position="4.2 0 -6">
          <a-cylinder position="0 2 0" radius="0.55" height="4" material="color: #071022; emissive: #ff2bd6; emissiveIntensity: 0.8; metalness: 0.9; roughness: 0.2"></a-cylinder>
          <a-torus position="0 4.4 0" radius="1.05" radius-tubular="0.08" rotation="90 0 0" material="color: #ff2bd6; emissive: #ff2bd6; emissiveIntensity: 1.6; opacity: 0.9; transparent: true" animation__spin="property: rotation; to: 90 0 360; dur: 9500; easing: linear; loop: true"></a-torus>
          <a-icosahedron position="0 5.3 0" radius="0.55" material="color: #061226; emissive: #00eaff; emissiveIntensity: 0.9; metalness: 0.7; roughness: 0.25"></a-icosahedron>
        </a-entity>

        <!-- Portal arches -->
        <a-torus position="0 3.6 -6.2" radius="4.6" radius-tubular="0.18" material="color: #09091f; emissive: #2b2fff; emissiveIntensity: 0.5; metalness: 0.8; roughness: 0.25"></a-torus>
        <a-torus position="0 3.6 -6.2" radius="4.2" radius-tubular="0.1" material="color: #00eaff; emissive: #00eaff; emissiveIntensity: 1.7; opacity: 0.9; transparent: true" animation__glow="property: material.emissiveIntensity; from: 0.8; to: 2.2; dir: alternate; dur: 1400; loop: true"></a-torus>
