<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Tomorrowland Path – Hand‑tracking walk & pinch turns (Quest 3)</title>

    <!-- A-Frame & extras -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.4.0/dist/aframe-extras.min.js"></script>
    <!-- teleport controls (still used for movement, but we override turn with custom pinch) -->
    <script src="https://cdn.jsdelivr.net/gh/diarmidmackenzie/aframe-teleport-controls@1.1.0/dist/aframe-teleport-controls.min.js"></script>

    <style>
      body { margin: 0; overflow: hidden; background: #000; }
    </style>
  </head>

  <body>
    <a-scene
      renderer="antialias: true; physicallyCorrectLights: true; colorManagement: true"
      background="color: #0a0c20"
      fog="type: exponential; color: #0a0b1a; density: 0.015"
      xr-mode-ui="enabled: true"
      hand-tracking="enabled: true;"
    >
      <!-- Assets and mixins -->
      <a-assets>
        <!-- teleport mixin for laser based movement (optional, but we keep for gamepad fallback) -->
        <a-mixin id="teleport-laser" teleport-controls="cameraRig: #rig; teleportOrigin: #camera; button: trigger; curveShootingSpeed: 18; landingMaxAngle: 60"></a-mixin>
        <!-- custom hand pinch turn logic (component defined below) -->
      </a-assets>

      <!-- sky and lights -->
      <a-sky color="#0e0f28"></a-sky>
      <a-entity light="type: ambient; intensity: 0.7; color: #b8c4ff"></a-entity>
      <a-entity light="type: directional; intensity: 0.8; color: #ffe5b0" position="5 12 8"></a-entity>

      <!-- Main rig: movement-controls provides locomotion (thumbstick) + we add custom pinch turn -->
      <a-entity 
        id="rig" 
        movement-controls="controls: hand, gamepad, keyboard; speed: 0.4"
        position="0 0 0"
        pinch-turn__left
        pinch-turn__right>

        <!-- Camera (player view) -->
        <a-entity id="camera" camera position="0 1.6 0" look-controls="pointerLockEnabled: false"></a-entity>

        <!-- Hand entities: hand-tracking + laser for teleport fallback (optional) -->
        <a-entity id="leftHand"
          hand-tracking-controls="hand: left; modelColor: #ffaa66;"
          laser-controls="hand: left"
          mixin="teleport-laser"
          raycaster="showLine: true; far: 20; lineOpacity: 0.4; objects: .floor, .teleport-surface">
        </a-entity>

        <a-entity id="rightHand"
          hand-tracking-controls="hand: right; modelColor: #66aaff;"
          laser-controls="hand: right"
          mixin="teleport-laser"
          raycaster="showLine: true; far: 20; lineOpacity: 0.4; objects: .floor, .teleport-surface">
        </a-entity>

        <!-- Left-hand pinch turn logic (custom component) -->
        <a-entity id="pinchLeftDetector" hand-tracking-controls="hand: left" visible="false"
          pinch-turn__left="hand: left; turnSpeed: 45;"></a-entity>
        <!-- Right-hand pinch turn logic -->
        <a-entity id="pinchRightDetector" hand-tracking-controls="hand: right" visible="false"
          pinch-turn__right="hand: right; turnSpeed: 45;"></a-entity>
      </a-entity>

      <!-- ========== THE PATH / CONCERT ARENA ========== -->
      <!-- Ground with path markers and glowing edges to guide way -->
      <a-entity position="0 -0.1 -20">
        <!-- main floor (semi transparent) -->
        <a-box width="50" height="0.2" depth="120" material="color: #101225; roughness: 0.8; metalness: 0.1; transparent: true; opacity: 0.7;" position="0 0 0"></a-box>

        <!-- the actual pathway: glowing stripes and arrows -->
        <a-entity position="0 0.2 0">
          <!-- central line (glowing) -->
          <a-cylinder radius="0.4" height="0.1" segments-radial="16" color="#ff88ff" position="0 0 -40" material="emissive: #ff44aa; emissiveIntensity: 1.2"></a-cylinder>
          <a-cylinder radius="0.4" height="0.1" segments-radial="16" color="#88aaff" position="0 0 -20" material="emissive: #4488ff; emissiveIntensity: 1.2"></a-cylinder>
          <a-cylinder radius="0.4" height="0.1" segments-radial="16" color="#88ffaa" position="0 0 0" material="emissive: #44ff88; emissiveIntensity: 1.2"></a-cylinder>
          <a-cylinder radius="0.4" height="0.1" segments-radial="16" color="#ffaa88" position="0 0 20" material="emissive: #ff8844; emissiveIntensity: 1.2"></a-cylinder>
          <a-cylinder radius="0.4" height="0.1" segments-radial="16" color="#ff88ff" position="0 0 40" material="emissive: #ff44aa; emissiveIntensity: 1.2"></a-cylinder>

          <!-- direction arrows (multiple along path) to show "the way" -->
          <a-entity position="-1.2 0.1 -30" rotation="0 90 0">
            <a-cone radius-bottom="1" radius-top="0" height="2" color="#ffaa33" material="emissive: #ffaa33; emissiveIntensity: 1.0"></a-cone>
            <a-box position="0 1.2 0" width="1.2" height="1.2" depth="3" color="#ffaa33" material="emissive: #ffaa33; emissiveIntensity: 1.0"></a-box>
          </a-entity>
          <a-entity position="1.2 0.1 -10" rotation="0 90 0">
            <a-cone radius-bottom="1" radius-top="0" height="2" color="#33aaff" material="emissive: #33aaff; emissiveIntensity: 1.0"></a-cone>
            <a-box position="0 1.2 0" width="1.2" height="1.2" depth="3" color="#33aaff" material="emissive: #33aaff; emissiveIntensity: 1.0"></a-box>
          </a-entity>
          <a-entity position="-1.2 0.1 10" rotation="0 90 0">
            <a-cone radius-bottom="1" radius-top="0" height="2" color="#ff66aa" material="emissive: #ff66aa; emissiveIntensity: 1.0"></a-cone>
            <a-box position="0 1.2 0" width="1.2" height="1.2" depth="3" color="#ff66aa" material="emissive: #ff66aa; emissiveIntensity: 1.0"></a-box>
          </a-entity>
          <a-entity position="1.2 0.1 30" rotation="0 90 0">
            <a-cone radius-bottom="1" radius-top="0" height="2" color="#88ff88" material="emissive: #88ff88; emissiveIntensity: 1.0"></a-cone>
            <a-box position="0 1.2 0" width="1.2" height="1.2" depth="3" color="#88ff88" material="emissive: #88ff88; emissiveIntensity: 1.0"></a-box>
          </a-entity>

          <!-- floating orbs to mark path edges (visual interest) -->
          <a-sphere radius="0.3" color="#ff99ff" material="emissive: #ff00ff; emissiveIntensity: 1.5" position="-2 1.2 -40"></a-sphere>
          <a-sphere radius="0.3" color="#99ffff" material="emissive: #00ffff; emissiveIntensity: 1.5" position="2 1.2 -40"></a-sphere>
          <a-sphere radius="0.3" color="#ffff99" material="emissive: #ffff00; emissiveIntensity: 1.5" position="-2 1.2 -20"></a-sphere>
          <a-sphere radius="0.3" color="#ffaa88" material="emissive: #ff8800; emissiveIntensity: 1.5" position="2 1.2 -20"></a-sphere>
          <a-sphere radius="0.3" color="#88ffaa" material="emissive: #44ff88; emissiveIntensity: 1.5" position="-2 1.2 0"></a-sphere>
          <a-sphere radius="0.3" color="#aa88ff" material="emissive: #8844ff; emissiveIntensity: 1.5" position="2 1.2 0"></a-sphere>
          <a-sphere radius="0.3" color="#ff88aa" material="emissive: #ff44aa; emissiveIntensity: 1.5" position="-2 1.2 20"></a-sphere>
          <a-sphere radius="0.3" color="#88aaff" material="emissive: #4488ff; emissiveIntensity: 1.5" position="2 1.2 20"></a-sphere>
          <a-sphere radius="0.3" color="#aaff88" material="emissive: #88ff44; emissiveIntensity: 1.5" position="-2 1.2 40"></a-sphere>
          <a-sphere radius="0.3" color="#ff88ff" material="emissive: #ff44ff; emissiveIntensity: 1.5" position="2 1.2 40"></a-sphere>
        </a-entity>
      </a-entity>

      <!-- arena / concert decorations (trees, arches) to give sense of place -->
      <a-entity position="-6 0 -15">
        <a-cone radius-bottom="2" radius-top="0.1" height="6" color="#301010" position="0 3 0"></a-cone>
        <a-sphere radius="1.8" color="#33aa33" material="emissive: #226622; emissiveIntensity: 0.4" position="0 6 0"></a-sphere>
      </a-entity>
      <a-entity position="6 0 -15">
        <a-cone radius-bottom="2" radius-top="0.1" height="6" color="#301010" position="0 3 0"></a-cone>
        <a-sphere radius="1.8" color="#33aa33" material="emissive: #226622; emissiveIntensity: 0.4" position="0 6 0"></a-sphere>
      </a-entity>

      <!-- arches along path -->
      <a-entity position="-4 0 -30">
        <a-ring radius-inner="1.5" radius-outer="1.7" color="#aa88ff" material="emissive: #8844ff; emissiveIntensity: 0.8" rotation="90 0 0"></a-ring>
        <a-ring radius-inner="1.5" radius-outer="1.7" color="#aa88ff" material="emissive: #8844ff; emissiveIntensity: 0.8" rotation="90 0 0" position="0 3 0"></a-ring>
        <a-box width="0.3" height="6" depth="0.3" color="#ccaaff" position="-1.5 3 0"></a-box>
        <a-box width="0.3" height="6" depth="0.3" color="#ccaaff" position="1.5 3 0"></a-box>
      </a-entity>

      <!-- STAGE in the distance (to look toward) -->
      <a-entity position="0 2 80" scale="4 4 4">
        <a-box width="4" height="0.8" depth="2" color="#222244" position="0 -0.4 0"></a-box>
        <a-box width="3" height="3" depth="0.5" color="#333366" position="0 1 0.5"></a-box>
        <a-torus radius="1" radius-tubular="0.1" color="#ff88ff" material="emissive: #ff00ff" position="0 2.5 0.5"></a-torus>
        <a-light type="point" intensity="2" color="#ff44aa" position="0 3 0.5"></a-light>
      </a-entity>

      <!-- floor class for teleport surfaces -->
      <a-box class="floor" visible="false" position="0 -0.2 -20" width="60" height="0.1" depth="140"></a-box>
      <a-box class="teleport-surface" visible="false" position="0 -0.2 -20" width="60" height="0.1" depth="140"></a-box>
    </a-scene>

    <!-- ========== CUSTOM PINCH TURN COMPONENT ========== 
         Listens to pinchstart on specified hand and rotates the rig by turnSpeed degrees.
         Uses hand-tracking events from the hand entity. -->
    <script>
      AFRAME.registerComponent('pinch-turn', {
        schema: {
          hand: { type: 'string', default: 'left' },   // left or right
          turnSpeed: { type: 'number', default: 45 }    // degrees per pinch
        },

        init: function () {
          this.handEl = null;
          this.boundOnPinchStart = this.onPinchStart.bind(this);
          this.boundOnPinchEnd = this.onPinchEnd.bind(this); // not used but nice to have
          this.pinching = false;
        },

        play: function () {
          // Find the actual hand entity (the one with hand-tracking-controls for our target hand)
          const hand = this.data.hand;
          // We look for any entity with hand-tracking-controls and attribute hand=left/right
          const handEntities = document.querySelectorAll('[hand-tracking-controls]');
          for (let el of handEntities) {
            const controls = el.components['hand-tracking-controls'];
            if (controls && controls.data && controls.data.hand === hand) {
              this.handEl = el;
              break;
            }
          }

          if (this.handEl) {
            this.handEl.addEventListener('pinchstart', this.boundOnPinchStart);
            this.handEl.addEventListener('pinchend', this.boundOnPinchEnd);
          } else {
            console.warn(`pinch-turn: no hand-tracking entity found for hand ${hand}`);
          }
        },

        pause: function () {
          if (this.handEl) {
            this.handEl.removeEventListener('pinchstart', this.boundOnPinchStart);
            this.handEl.removeEventListener('pinchend', this.boundOnPinchEnd);
          }
        },

        onPinchStart: function (evt) {
          if (this.pinching) return; // avoid multiple triggers
          this.pinching = true;

          // Find the rig (parent of camera)
          const rig = document.getElementById('rig');
          if (!rig) return;

          // Get current rotation (yaw) and add turn (left = positive, right = negative? depends on hand)
          let currentRot = rig.object3D.rotation.y;
          let turnDeg = this.data.turnSpeed;
          // For left hand: turn left (positive Y rotation) ; for right hand: turn right (negative)
          if (this.data.hand === 'right') {
            turnDeg = -turnDeg;
          }
          const turnRad = THREE.MathUtils.degToRad(turnDeg);
          const newYaw = currentRot + turnRad;

          // Apply rotation (preserve x and z rotation = 0)
          rig.object3D.rotation.y = newYaw;

          // Optional: slight haptic feedback if available (for Quest)
          if (this.handEl && this.handEl.components['hand-tracking-controls']) {
            const handModel = this.handEl.components['hand-tracking-controls'];
            if (handModel && handModel.haptic) {
              handModel.haptic(0.2, 50);
            } else {
              // fallback pulse via gamepad if available (not guaranteed but try)
              try {
                const gamepads = navigator.getGamepads();
                const handIndex = this.data.hand === 'left' ? 0 : 1;
                if (gamepads[handIndex] && gamepads[handIndex].hapticActuators) {
                  gamepads[handIndex].hapticActuators[0].pulse(0.5, 50);
                }
              } catch (e) {}
            }
          }

          // Reset pinching flag after short delay to avoid repeated turns from same pinch hold
          // But we also listen to pinchend to reset earlier.
          setTimeout(() => { this.pinching = false; }, 300);
        },

        onPinchEnd: function () {
          this.pinching = false;
        }
      });

      // Register two instances: left and right (could also just use one with different data)
      AFRAME.registerComponent('pinch-turn__left', {
        schema: {
          hand: { default: 'left' },
          turnSpeed: { default: 45 }
        },
        init: function () {
          this.handEl = null;
          this.boundOnPinchStart = this.onPinchStart.bind(this);
          this.boundOnPinchEnd = this.onPinchEnd.bind(this);
          this.pinching = false;
        },
        play: function () {
          const handEntities = document.querySelectorAll('[hand-tracking-controls]');
          for (let el of handEntities) {
            const controls = el.components['hand-tracking-controls'];
            if (controls && controls.data && controls.data.hand === 'left') {
              this.handEl = el;
              break;
            }
          }
          if (this.handEl) {
            this.handEl.addEventListener('pinchstart', this.boundOnPinchStart);
            this.handEl.addEventListener('pinchend', this.boundOnPinchEnd);
          }
        },
        pause: function () {
          if (this.handEl) {
            this.handEl.removeEventListener('pinchstart', this.boundOnPinchStart);
            this.handEl.removeEventListener('pinchend', this.boundOnPinchEnd);
          }
        },
        onPinchStart: function () {
          if (this.pinching) return;
          this.pinching = true;
          const rig = document.getElementById('rig');
          if (rig) {
            let currentRot = rig.object3D.rotation.y;
            const turnRad = THREE.MathUtils.degToRad(45); // left turn positive
            rig.object3D.rotation.y = currentRot + turnRad;
          }
          setTimeout(() => { this.pinching = false; }, 300);
        },
        onPinchEnd: function () { this.pinching = false; }
      });

      AFRAME.registerComponent('pinch-turn__right', {
        schema: {
          hand: { default: 'right' },
          turnSpeed: { default: 45 }
        },
        init: function () {
          this.handEl = null;
          this.boundOnPinchStart = this.onPinchStart.bind(this);
          this.boundOnPinchEnd = this.onPinchEnd.bind(this);
          this.pinching = false;
        },
        play: function () {
          const handEntities = document.querySelectorAll('[hand-tracking-controls]');
          for (let el of handEntities) {
            const controls = el.components['hand-tracking-controls'];
            if (controls && controls.data && controls.data.hand === 'right') {
              this.handEl = el;
              break;
            }
          }
          if (this.handEl) {
            this.handEl.addEventListener('pinchstart', this.boundOnPinchStart);
            this.handEl.addEventListener('pinchend', this.boundOnPinchEnd);
          }
        },
        pause: function () {
          if (this.handEl) {
            this.handEl.removeEventListener('pinchstart', this.boundOnPinchStart);
            this.handEl.removeEventListener('pinchend', this.boundOnPinchEnd);
          }
        },
        onPinchStart: function () {
          if (this.pinching) return;
          this.pinching = true;
          const rig = document.getElementById('rig');
          if (rig) {
            let currentRot = rig.object3D.rotation.y;
            const turnRad = THREE.MathUtils.degToRad(-45); // right turn negative
            rig.object3D.rotation.y = currentRot + turnRad;
          }
          setTimeout(() => { this.pinching = false; }, 300);
        },
        onPinchEnd: function () { this.pinching = false; }
      });
    </script>

    <!-- Optional: style to make hands more visible -->
    <style>
      .a-enter-vr, .a-enter-ar { z-index: 999; }
    </style>
  </body>
</html>
